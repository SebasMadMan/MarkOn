<main class="flexBox">
    <form action="">
        <label for="name">Nombre:</label>
        <input type="text" id="name" placeholder="John Doe">
    
        <label for="surname">Apellido:</label>
        <input type="text" id="surname" placeholder="Doe">

        <label for="age">Edad:</label>
        <input type="number" id="age" placeholder="25">

        <label for="mail">E-Mail</label>
        <input type="email" id="mail" placeholder="johndoe@gmail.com">

        <label for="pass">Contraseña:</label>
        <input type="password" id="pass">

        <label for="text">Dejanos tus comentarios:</label>
        <textarea id="comments" placeholder="Comentarios..."></textarea>

        <!--Boton de enviar--> 
        <input type="submit" value="enviar"> 

        <!--Comenzar de nuevo-->
        <input type="reset" value="Comenzar de nuevo">

        <input type="date" name="" id="">
    </form>
